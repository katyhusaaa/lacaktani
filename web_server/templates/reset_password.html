{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #F8FAFC; padding: 20px;">
    <div class="auth-card" style="background: white; width: 100%; max-width: 420px; padding: 40px 32px; border-radius: 24px; box-shadow: 0 15px 35px rgba(15, 23, 42, 0.05); border: 1px solid #E2E8F0;">
        
        <div class="auth-header" style="text-align: center; margin-bottom: 32px;">
            <div class="auth-logo" style="font-size: 24px; font-weight: 900; color: #0F172A; letter-spacing: -0.5px; margin-bottom: 8px;">
                LacakTani<span style="color: #E11D48;">.ai</span>
            </div>
            <h2 class="auth-title" style="font-size: 18px; font-weight: 800; color: #0F172A; margin: 0 0 8px 0;">Buat Password Baru</h2>
            <p class="auth-subtitle" style="font-size: 13px; color: #64748B; line-height: 1.5; margin: 0;">Silakan masukkan password baru Anda. Pastikan kombinasi aman dan mudah diingat.</p>
        </div>

        <form action="{{ url_for('auth.reset_password', token=token) }}" method="POST">
            <div class="auth-input-group" style="margin-bottom: 16px; position: relative;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2.5" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%);">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" name="password" class="saas-input" placeholder="Ketik Password Baru" required minlength="6" style="width: 100%; padding: 14px 16px 14px 46px; border: 2px solid #E2E8F0; border-radius: 14px; font-size: 14px; font-weight: 600; box-sizing: border-box; outline: none;">
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; padding: 16px; border-radius: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 24px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                    <polyline points="7 3 7 8 15 8"></polyline>
                </svg>
                Simpan Password Baru
            </button>
        </form>

        <div style="text-align: center; margin-top: 24px; font-size: 13px; font-weight: 700; color: #64748B;">
            Batal reset? <a href="/" style="color: #0EA5E9; text-decoration: none;">Kembali ke Halaman Awal</a>
        </div>

    </div>
</div>

<style>
    /* Sedikit styling tambahan buat input focus */
    .saas-input:focus {
        border-color: #E11D48 !important;
        background: white !important;
        box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1);
    }
</style>
{% endblock %}
